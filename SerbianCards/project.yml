name: SerbianCards
options:
  bundleIdPrefix: com.serbianCards
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  ZipArchive:
    url: https://github.com/ZipArchive/ZipArchive.git
    from: 2.5.0

targets:
  SerbianCards:
    type: application
    platform: iOS
    sources:
      - SerbianCards
    settings:
      base:
        INFOPLIST_FILE: SerbianCards/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.serbianCards.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
        Release:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
    dependencies:
      - package: ZipArchive

  SerbianCardsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SerbianCardsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.serbianCards.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
        Release:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
    dependencies:
      - target: SerbianCards

  SerbianCardsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SerbianCardsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.serbianCards.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
        Release:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
    dependencies:
      - target: SerbianCards
